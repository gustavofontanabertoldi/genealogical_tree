<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Evento</title>
</head>
<body>

<h1>Criar evento para a árvore "{{ tree.name }}"</h1>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Salvar Evento
    </button>
</form>

<br>

<a href="{% url 'view_tree' tree.id %}">
    Cancelar
</a>

</body>
</html>
